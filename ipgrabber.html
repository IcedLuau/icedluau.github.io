<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>haha gottem /s</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00, #ff00ff);
            background-size: 400% 400%;
            animation: gradientShift 3s ease infinite;
            font-family: Comic Sans MS, cursive;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.8);
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            color: #00ff00;
            font-size: 4em;
            margin: 0;
            text-shadow: 0 0 20px #00ff00, 0 0 40px #ff00ff;
            animation: glitch 0.3s infinite;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 20px #00ff00, 0 0 40px #ff00ff; }
            50% { text-shadow: 0 0 20px #ff0000, 0 0 40px #ffff00; }
        }

        .emoji {
            font-size: 3em;
            margin: 20px 0;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .disclaimer {
            color: #ffff00;
            font-size: 1.5em;
            margin-top: 30px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .satire-badge {
            display: inline-block;
            background: #ff00ff;
            color: #00ffff;
            padding: 10px 20px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>UR IP GOT GRABBED HAHA LOLZ :3 MRRP MEOW</h1>
        <div class="emoji">😹😹😹</div>
        <div class="disclaimer">/s</div>

    </div>
</body>
</html>
